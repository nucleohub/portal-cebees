name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: cebees
          POSTGRES_PASSWORD: cebees_test
          POSTGRES_DB: cebees_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run migrations
        run: npm run migrate
        env:
          DATABASE_URL: postgres://cebees:cebees_test@localhost:5432/cebees_test
          NODE_ENV: test

      - name: Test
        run: npm test
        env:
          DATABASE_URL: postgres://cebees:cebees_test@localhost:5432/cebees_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: test_secret_ci_only
          ENCRYPTION_KEY: test_encryption_key_32_bytes_min_ci

      - name: Build
        run: npm run build
